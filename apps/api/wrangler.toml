name = "agentic-wallet-api"
main = "src/index.ts"
compatibility_date = "2026-02-22"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/v1/*"]

[[d1_databases]]
binding = "DB"
database_name = "agentic_wallet_db"
database_id = "931f7f71-e632-4964-95ff-6177f58d6181"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "AGENT_ARTICLES"
bucket_name = "agentic-wallet-articles"

[[durable_objects.bindings]]
name = "USER_AGENT"
class_name = "UserAgentDO"

[[migrations]]
tag = "user-agent-do-v1"
new_sqlite_classes = ["UserAgentDO"]

[triggers]
crons = ["0 0 * * *", "5 */12 * * *"]
